<div class="page" id="page-attendance-reports">
    <div class="reports-container">
        <div class="reports-header">
            <h3>Laporan Kehadiran & Lembur</h3>
            <div class="reports-filters" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <select id="report-employee-filter">
                    <option value="">Semua Karyawan</option>
                </select>
                <select id="report-type-filter">
                    <option value="">Semua Tipe</option>
                    <option value="MASUK">MASUK</option>
                    <option value="PULANG">PULANG</option>
                    <option value="MULAI_LEMBUR">MULAI LEMBUR</option>
                    <option value="SELESAI_LEMBUR">SELESAI LEMBUR</option>
                </select>
                <button class="btn-primary" id="btn-export-attendance">
                    <i class="fas fa-file-excel"></i> Export CSV
                </button>
            </div>
        </div>
        <div class="reports-table-card" style="background: #fff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden;">
            <div class="table-responsive">
                <table class="reports-table" style="width: 100%; border-collapse: collapse;">
                    <thead style="background: #f8fafc;">
                        <tr>
                            <th>No</th>
                            <th>Waktu</th>
                            <th>Nama</th>
                            <th>Tipe</th>
                            <th style="width: 150px;">Lokasi</th>
                            <th>Foto</th>
                            <th>Keterangan</th>
                            <th>Mulai</th>
                            <th>Selesai</th>
                            <th style="background: #fffbeb; color: #b45309;">Total Jam</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-reports-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
