<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Karyawan | PT. Bisatani</title>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/absensi.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .hidden { display: none !important; }
        .page { display: none; }
        .page.active { display: block; }
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 15px; align-items: flex-end; border: 1px solid #e2e8f0; }
        .filter-item { display: flex; flex-direction: column; gap: 5px; }
        .filter-item label { font-size: 11px; font-weight: 600; color: #64748b; }
        .filter-item input, .filter-item select { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; }
    </style>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</head>

<body>
    <div id="toast-container"></div>

    <div id="login-container" class="login-container">
        <div class="login-form-container">
            <h1 style="text-align:center; color:#10b981;">PT. BISATANI</h1>
            <form id="login-form" onsubmit="return false;">
                <div class="input-group">
                    <input type="text" id="login-email" placeholder="ID / Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder="Password" required>
                </div>
                <div class="role-selector">
                    <label><input type="radio" name="role" value="employee" checked> Karyawan</label>
                    <label><input type="radio" name="role" value="admin"> Admin</label>
                </div>
                <button type="submit" class="btn-login">LOGIN</button>
            </form>
        </div>
    </div>

    <div id="app-container" class="app-container hidden">
        <aside class="sidebar">
            <div class="sidebar-logo">BISATANI</div>
            <nav id="employee-menu" class="sidebar-nav">
                <div class="nav-item active" data-page="dashboard">Dashboard</div>
                <div class="nav-item" data-page="absensi">Absensi</div>
            </nav>
            <nav id="admin-menu-nav" class="sidebar-nav hidden">
                <div class="nav-item" data-page="admin-dashboard">Admin Dash</div>
                <div class="nav-item" data-page="attendance-reports">Rekap Absen</div>
                <div class="nav-item" data-page="employees">Data Karyawan</div>
            </nav>
            <div class="sidebar-footer">
                <span id="user-name">User</span>
                <span id="user-role" class="hidden"></span>
                <button id="btn-logout">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Dashboard</h1>
                <div id="current-time">00:00:00</div>
            </header>

            <div id="page-content">
                <div class="page active" id="page-dashboard">
                    <h3>Halo, <span id="welcome-name"></span>!</h3>
                </div>

                <div class="page" id="page-absensi">
                    <div id="live-clock" style="font-size:30px; font-weight:bold;">00:00:00</div>
                    <div class="camera-box" style="width:300px; height:225px; background:#000; margin:10px auto; border-radius:10px; overflow:hidden;">
                        <video id="webcam-preview" autoplay playsinline style="width:100%; height:100%; object-fit:cover; transform:scaleX(-1);"></video>
                    </div>
                    <p id="location-text">Mencari lokasi...</p>
                    <div id="attendance-btns"></div>
                </div>

                <div class="page" id="page-attendance-reports">
                    <div class="filter-row">
                        <div class="filter-item"><label>Dari</label><input type="date" id="report-start-date"></div>
                        <div class="filter-item"><label>Sampai</label><input type="date" id="report-end-date"></div>
                        <div class="filter-item">
                            <label>Tipe</label>
                            <select id="report-type-filter">
                                <option value="">Semua Tipe</option>
                                <option value="MASUK">MASUK</option>
                                <option value="PULANG">PULANG</option>
                                <option value="MULAI_LEMBUR">MULAI LEMBUR</option>
                                <option value="SELESAI_LEMBUR">SELESAI LEMBUR</option>
                            </select>
                        </div>
                        <div class="filter-item"><label>Karyawan</label><select id="report-employee-filter"><option value="">Semua</option></select></div>
                    </div>
                    <div id="overtime-summary-card" class="hidden">Total: <span id="total-overtime-hours">0</span> Jam</div>
                    <table class="reports-table" style="width:100%">
                        <thead>
                            <tr><th>No</th><th>Waktu</th><th>Nama</th><th>Tipe</th><th>Lokasi</th><th>Foto</th><th>Ket</th><th>Mulai</th><th>Selesai</th><th>Total</th></tr>
                        </thead>
                        <tbody id="attendance-reports-body"></tbody>
                    </table>
                </div>

                <div class="page" id="page-admin-dashboard"></div>
                <div class="page" id="page-employees"></div>
                <div class="page" id="page-payroll-reports"></div>
                <div class="page" id="page-settings"></div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/absensi.js"></script>
    <script src="js/admin-reports.js"></script>
    <script src="js/payroll.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/admin-employees.js"></script>
</body>
</html>
