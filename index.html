<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <meta name="theme-color" content="#ffffff">
    <title>Portal Karyawan | PT. Bisatani</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/absensi.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/face-rec.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Proteksi agar tidak berantakan */
        .hidden { display: none !important; }
        .modal { display: none !important; }
        .modal[style*="display: flex"] { display: flex !important; }
        
        /* Merapikan Filter Section */
        .filter-row { 
            display: flex; 
            gap: 15px; 
            flex-wrap: wrap; 
            background: #f8fafc; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            align-items: flex-end; 
            border: 1px solid #e2e8f0;
        }
        .filter-item { display: flex; flex-direction: column; gap: 5px; }
        .filter-item label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        .filter-item input, .filter-item select { 
            padding: 8px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            font-size: 13px; 
            min-width: 140px; 
            background: white;
        }
    </style>
</head>

<body>
    <div id="toast-container" class="toast-container"></div>

    <div id="login-container" class="login-container">
        <div class="login-left">
            <div class="login-animation">
                <div class="central-logo"><div class="logo-core"><i class="fas fa-leaf"></i></div></div>
                <h1 class="company-name">PT. BISATANI</h1>
                <p class="tagline">Sistem Absensi & Payroll Terintegrasi</p>
            </div>
        </div>
        <div class="login-right">
            <div class="login-form-container">
                <div class="login-header">
                    <h2>Selamat Datang</h2>
                    <p>Silakan login untuk mulai bekerja</p>
                </div>
                <form id="login-form" class="login-form" onsubmit="return false;">
                    <div class="input-group">
                        <label for="login-email">ID Karyawan / Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="login-email" placeholder="Masukkan ID atau Email" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="login-password" placeholder="Masukkan password" required>
                            <button type="button" class="toggle-password" id="toggle-password"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="role-selector">
                        <div class="role-options">
                            <label class="role-option">
                                <input type="radio" name="role" value="employee" checked>
                                <span class="role-card"><i class="fas fa-user"></i><span>Karyawan</span></span>
                            </label>
                            <label class="role-option">
                                <input type="radio" name="role" value="admin">
                                <span class="role-card"><i class="fas fa-user-shield"></i><span>Admin</span></span>
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="btn-login"><span>Login</span><i class="fas fa-arrow-right"></i></button>
                </form>
            </div>
        </div>
    </div>

    <div id="app-container" class="app-container hidden">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="fas fa-seedling"></i><span class="sidebar-brand">BISATANI</span></div>
            </div>
            
            <nav class="sidebar-nav employee-menu" id="employee-menu">
                <div class="nav-section">
                    <span class="nav-label">Menu Utama</span>
                    <ul class="nav-list">
                        <li class="nav-item active" data-page="dashboard"><a href="#" class="nav-link"><i class="fas fa-home"></i><span>Dashboard</span></a></li>
                        <li class="nav-item" data-page="absensi"><a href="#" class="nav-link"><i class="fas fa-clock"></i><span>Absensi & Lembur</span></a></li>
                    </ul>
                </div>
            </nav>

            <nav class="sidebar-nav admin-menu hidden" id="admin-menu-nav">
                <div class="nav-section">
                    <span class="nav-label">Panel Admin</span>
                    <ul class="nav-list">
                        <li class="nav-item" data-page="admin-dashboard"><a href="#" class="nav-link"><i class="fas fa-chart-line"></i><span>Dashboard Admin</span></a></li>
                        <li class="nav-item" data-page="employees"><a href="#" class="nav-link"><i class="fas fa-users"></i><span>Data Karyawan</span></a></li>
                    </ul>
                </div>
                <div class="nav-section">
                    <span class="nav-label">Laporan & Gaji</span>
                    <ul class="nav-list">
                        <li class="nav-item" data-page="attendance-reports"><a href="#" class="nav-link"><i class="fas fa-file-invoice"></i><span>Rekap Absensi</span></a></li>
                        <li class="nav-item" data-page="payroll-reports"><a href="#" class="nav-link"><i class="
