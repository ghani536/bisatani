<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <meta name="theme-color" content="#ffffff">
    <title>Portal Karyawan | PT. Bisatani</title>
    <link rel="stylesheet" href="css/main.css">

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/absensi.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/face-rec.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal { display: none !important; }
        .modal[style*="display: flex"] { display: flex !important; }
        .modal[style*="display: block"] { display: block !important; }
        .reports-table-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; margin-top: 15px; }
        .reports-table th { white-space: nowrap; font-size: 0.75rem; }
        .filter-row { display: flex; gap: 15px; flex-wrap: wrap; background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 15px; align-items: flex-end; }
        .filter-item { display: flex; flex-direction: column; gap: 5px; }
        .filter-item label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        .filter-item input, .filter-item select { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; }
    </style>
</head>

<body>
    <div id="toast-container" class="toast-container"></div>

    <div id="login-container" class="login-container">
        <div class="login-left">
            <div class="login-animation">
                <div class="central-logo"><div class="logo-core"><i class="fas fa-leaf"></i></div></div>
                <h1 class="company-name">PT. BISATANI</h1>
                <p class="tagline">Sistem Absensi & Payroll Terintegrasi</p>
            </div>
        </div>
        <div class="login-right">
            <div class="login-form-container">
                <div class="login-header">
                    <h2>Selamat Datang</h2>
                    <p>Silakan login untuk mulai bekerja</p>
                </div>
                <form id="login-form" class="login-form">
                    <div class="input-group">
                        <label>ID Karyawan / Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="login-email" placeholder="Masukkan ID atau Email" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="login-password" placeholder="Masukkan password" required>
                            <button type="button" class="toggle-password" id="toggle-password"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="role-selector">
                        <div class="role-options">
                            <label class="role-option">
                                <input type="radio" name="role" value="employee" checked>
                                <span class="role-card"><i class="fas fa-user"></i><span>Karyawan</span></span>
                            </label>
                            <label class="role-option">
                                <input type="radio" name="role" value="admin">
                                <span class="role-card"><i class="fas fa-user-shield"></i><span>Admin</span></span>
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="btn-login"><span>Login</span><i class="fas fa-arrow-right"></i></button>
                </form>
            </div>
        </div>
    </div>
