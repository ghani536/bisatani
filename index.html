<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Karyawan | PT. Bisatani</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/absensi.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hidden { display: none !important; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <div id="login-container">
        <div class="login-form-container">
            <h2>PT. BISATANI</h2>
            <form id="login-form" onsubmit="return false;">
                <input type="text" id="login-email" placeholder="ID / Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <div class="role-selector">
                    <input type="radio" name="role" value="employee" id="role-emp" checked> <label for="role-emp">Karyawan</label>
                    <input type="radio" name="role" value="admin" id="role-adm"> <label for="role-adm">Admin</label>
                </div>
                <button type="submit" class="btn-login">Login</button>
            </form>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <aside class="sidebar">
            <div id="employee-menu" class="menu-box">
                <button data-page="dashboard">Dashboard</button>
                <button data-page="absensi">Absensi</button>
            </div>
            <div id="admin-menu-nav" class="menu-box hidden">
                <button data-page="admin-dashboard">Admin Dash</button>
                <button data-page="attendance-reports">Rekap Absen</button>
                <button data-page="employees">Data Karyawan</button>
            </div>
            <div class="user-info">
                <span id="user-name">User</span>
                <span id="user-role">Role</span>
                <button id="btn-logout">Logout</button>
            </div>
        </aside>

        <main>
            <h1 id="page-title">Dashboard</h1>
            <div id="page-content">
                <div class="page active" id="page-dashboard">Selamat datang <span id="welcome-name"></span></div>
                
                <div class="page" id="page-absensi">
                    <div id="live-clock">00:00:00</div>
                    <video id="webcam-preview" autoplay playsinline style="width:200px;"></video>
                    <p id="location-text">Mencari GPS...</p>
                    <div id="attendance-btns"></div>
                </div>

                <div class="page" id="page-attendance-reports">
                    <div class="filter-row">
                        <input type="date" id="report-start-date">
                        <input type="date" id="report-end-date">
                        <select id="report-type-filter">
                            <option value="">Semua Tipe</option>
                            <option value="MASUK">MASUK</option>
                            <option value="PULANG">PULANG</option>
                            <option value="MULAI_LEMBUR">MULAI LEMBUR</option>
                            <option value="SELESAI_LEMBUR">SELESAI LEMBUR</option>
                        </select>
                        <select id="report-employee-filter"><option value="">Semua</option></select>
                    </div>
                    <div id="overtime-summary-card" style="display:none">Total: <span id="total-overtime-hours">0</span></div>
                    <table>
                        <thead><tr><th>No</th><th>Waktu</th><th>Nama</th><th>Tipe</th><th>Lokasi</th><th>Foto</th><th>Ket</th><th>Mulai</th><th>Selesai</th><th>Total</th></tr></thead>
                        <tbody id="attendance-reports-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/absensi.js"></script>
    <script src="js/admin-reports.js"></script>
</body>
</html>
